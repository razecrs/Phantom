# Phantom module cargo config
# i pin the host (build-script) linker to the GNU self-contained ld
# so build scripts compile correctly without MSVC link.exe

[host.x86_64-pc-windows-gnu]
linker = "C:\\Users\\raze\\.rustup\\toolchains\\stable-x86_64-pc-windows-gnu\\lib\\rustlib\\x86_64-pc-windows-gnu\\bin\\self-contained\\x86_64-w64-mingw32-gcc.exe"

[target.aarch64-linux-android]
linker = "C:/Users/raze/ndk/android-ndk-r27c/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android26-clang.cmd"

[target.armv7-linux-androideabi]
linker = "C:/Users/raze/ndk/android-ndk-r27c/toolchains/llvm/prebuilt/windows-x86_64/bin/armv7a-linux-androideabi26-clang.cmd"

[env]
# cc = "1.0.99" uses TARGET_AR (not AR_aarch64_linux_android) for the archiver
TARGET_AR = "C:/Users/raze/ndk/android-ndk-r27c/toolchains/llvm/prebuilt/windows-x86_64/bin/llvm-ar.exe"
CC_aarch64_linux_android = "C:/Users/raze/ndk/android-ndk-r27c/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android26-clang.cmd"
CC_armv7_linux_androideabi = "C:/Users/raze/ndk/android-ndk-r27c/toolchains/llvm/prebuilt/windows-x86_64/bin/armv7a-linux-androideabi26-clang.cmd"
